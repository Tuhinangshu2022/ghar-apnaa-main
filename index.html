<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GharApnaa — Coming Soon</title>
    <meta
      name="description"
      content="Har sapne ko mile apnaa address. India ke har ghar ke liye. Launching Soon."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=Kalam:wght@300;400&family=DM+Sans:ital,wght@0,200;0,300;1,200&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #fdf7f0;
        --ink: #261a15;
        --muted: #9a7d6e;
        --accent: #b86a45;
        --gold: #c9955a;
        --rose: #dfa898;
        --blush: #edd4c4;
        --sage: #a8c4a0;
        --sky: #a4c8dc;
        --lav: #c8bce0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
      }

      /* ═══════════════════════════════════
       ANIMATED AURORA BACKGROUND
    ═══════════════════════════════════ */
      .aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .aurora-layer {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        mix-blend-mode: multiply;
        animation: auroraMove ease-in-out infinite alternate;
      }
      .al1 {
        width: 700px;
        height: 700px;
        top: -200px;
        left: -150px;
        background: #f5c8b840;
        animation-duration: 18s;
      }
      .al2 {
        width: 600px;
        height: 600px;
        bottom: -200px;
        right: -150px;
        background: #a8d0e840;
        animation-duration: 22s;
        animation-delay: -8s;
      }
      .al3 {
        width: 500px;
        height: 500px;
        top: 30%;
        left: 50%;
        background: #c8bce040;
        animation-duration: 15s;
        animation-delay: -5s;
      }
      .al4 {
        width: 400px;
        height: 400px;
        top: 55%;
        left: 5%;
        background: #a8c4a040;
        animation-duration: 20s;
        animation-delay: -11s;
      }
      .al5 {
        width: 350px;
        height: 350px;
        top: 10%;
        right: 10%;
        background: #f0d8c040;
        animation-duration: 16s;
        animation-delay: -3s;
      }
      @keyframes auroraMove {
        0% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        33% {
          transform: translate(30px, -25px) scale(1.08) rotate(5deg);
        }
        66% {
          transform: translate(-15px, 20px) scale(0.95) rotate(-3deg);
        }
        100% {
          transform: translate(20px, -40px) scale(1.12) rotate(8deg);
        }
      }

      /* Grain */
      .grain {
        position: fixed;
        inset: -50%;
        width: 200%;
        height: 200%;
        z-index: 1;
        opacity: 0.028;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        animation: gr 0.35s steps(1) infinite;
      }
      @keyframes gr {
        0% {
          transform: translate(0, 0);
        }
        25% {
          transform: translate(-2%, -1%);
        }
        50% {
          transform: translate(1%, 2%);
        }
        75% {
          transform: translate(-1%, 1%);
        }
      }

      /* ═══════════════════════════════════
       FLOATING PETALS
    ═══════════════════════════════════ */
      .petals {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      .petal {
        position: absolute;
        top: -20px;
        opacity: 0;
        animation: petalDrift linear infinite;
      }
      @keyframes petalDrift {
        0% {
          opacity: 0;
          transform: translateY(0) translateX(0) rotate(0deg) scale(0.6);
        }
        6% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          opacity: 0;
          transform: translateY(108vh) translateX(60px) rotate(420deg) scale(1);
        }
      }

      /* ═══════════════════════════════════
       TWINKLE STARS
    ═══════════════════════════════════ */
      .stars {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        background: rgba(196, 120, 90, 0.6);
        animation: twinkle ease-in-out infinite alternate;
      }
      @keyframes twinkle {
        from {
          opacity: 0.1;
          transform: scale(0.5);
        }
        to {
          opacity: 0.8;
          transform: scale(1.3);
        }
      }

      /* ═══════════════════════════════════
       CORNER FRAMES
    ═══════════════════════════════════ */
      .frame {
        position: fixed;
        z-index: 3;
        pointer-events: none;
        opacity: 0;
        animation: fadeUp 3s ease 1.5s forwards;
      }
      .frame.tl {
        top: 0;
        left: 0;
      }
      .frame.tr {
        top: 0;
        right: 0;
        transform: scaleX(-1);
      }
      .frame.bl {
        bottom: 0;
        left: 0;
        transform: scaleY(-1);
      }
      .frame.br {
        bottom: 0;
        right: 0;
        transform: scale(-1);
      }
      @keyframes fadeUp {
        to {
          opacity: 1;
        }
      }

      /* ═══════════════════════════════════
       MAIN STAGE
    ═══════════════════════════════════ */
      .stage {
        position: relative;
        z-index: 10;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0;
      }

      /* ═══════════════════════════════════
       TOP LABEL
    ═══════════════════════════════════ */
      .label-row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 1.8rem;
        opacity: 0;
        animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
      }
      .label-line {
        height: 1px;
        width: 50px;
        background: linear-gradient(90deg, transparent, var(--accent));
      }
      .label-line.r {
        background: linear-gradient(90deg, var(--accent), transparent);
      }
      .label-text {
        font-size: 0.58rem;
        font-weight: 200;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: var(--accent);
        font-family: "DM Sans", sans-serif;
      }
      .label-gem {
        width: 4px;
        height: 4px;
        background: var(--accent);
        transform: rotate(45deg);
        opacity: 0.6;
      }

      /* ═══════════════════════════════════
       LOGO
    ═══════════════════════════════════ */
      .logo-wrap {
        position: relative;
        width: clamp(130px, 19vmin, 185px);
        height: clamp(130px, 19vmin, 185px);
        margin-bottom: 2rem;
        opacity: 0;
        animation: popBloom 1.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
      }

      /* Outer glow ring */
      .logo-glow {
        position: absolute;
        inset: -18px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          rgba(232, 168, 152, 0.3),
          rgba(201, 149, 90, 0.3),
          rgba(168, 196, 160, 0.3),
          rgba(164, 200, 220, 0.3),
          rgba(200, 188, 224, 0.3),
          rgba(232, 168, 152, 0.3)
        );
        filter: blur(8px);
        animation: spinSlow 12s linear infinite;
      }

      /* Spinning crisp ring */
      .logo-ring {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #e8a898,
          #c9955a,
          #a8c4a0,
          #a4c8dc,
          #c8bce0,
          #e8a898
        );
        animation: spinSlow 10s linear infinite;
        opacity: 0.5;
      }

      /* White gap */
      .logo-gap {
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        background: var(--bg);
      }

      /* Inner glass circle */
      .logo-inner {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9) 0%,
          rgba(253, 244, 235, 0.75) 100%
        );
        backdrop-filter: blur(16px);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 40px rgba(184, 106, 69, 0.2),
          0 2px 8px rgba(184, 106, 69, 0.1),
          inset 0 1.5px 0 rgba(255, 255, 255, 0.95),
          inset 0 -1px 0 rgba(184, 106, 69, 0.08);
        animation: logoFloat 5.5s ease-in-out infinite;
      }
      .logo-inner img {
        width: 66%;
        filter: drop-shadow(0 6px 18px rgba(184, 106, 69, 0.3));
        animation: logoRock 5.5s ease-in-out infinite;
      }

      @keyframes spinSlow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes logoFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-16px);
        }
      }
      @keyframes logoRock {
        0%,
        100% {
          transform: rotate(-2deg) scale(1);
        }
        50% {
          transform: rotate(2deg) scale(1.03);
        }
      }
      @keyframes popBloom {
        0% {
          opacity: 0;
          transform: scale(0.15) rotate(-25deg);
          filter: blur(20px);
        }
        60% {
          filter: blur(0);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
          filter: blur(0);
        }
      }

      /* ═══════════════════════════════════
       BRAND NAME
    ═══════════════════════════════════ */
      .brand {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(4.2rem, 11vw, 8.5rem);
        font-weight: 200;
        line-height: 0.85;
        letter-spacing: -0.01em;
        color: var(--ink);
        margin-bottom: 0.6rem;
        opacity: 0;
        animation: riseIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.65s forwards;
      }
      .brand .g {
        display: block;
      }
      .brand .a {
        display: block;
        font-style: italic;
        background: linear-gradient(135deg, var(--accent), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 300;
      }

      /* ═══════════════════════════════════
       SUBTITLE
    ═══════════════════════════════════ */
      .sub-wrap {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 1.2rem;
        opacity: 0;
        animation: riseIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
      }
      .sub-line {
        width: 30px;
        height: 1px;
        background: var(--muted);
        opacity: 0.3;
      }
      .sub-text {
        font-family: "Kalam", cursive;
        font-weight: 300;
        font-size: clamp(0.95rem, 2.6vw, 1.4rem);
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      /* ═══════════════════════════════════
       TAGLINE
    ═══════════════════════════════════ */
      .tagline {
        font-size: clamp(0.2rem, 1.6vw, 0.88rem);
        font-weight: 400;
        color: var(--muted);
        line-height: 2.1;
        letter-spacing: 0.05em;
        max-width: 36ch;
        margin-bottom: 1.8rem;
        opacity: 0;
        animation: riseIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.05s forwards;
      }

      /* ═══════════════════════════════════
       SOUNDWAVE
    ═══════════════════════════════════ */
      .soundwave {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 40px;
        margin-bottom: 1.8rem;
        opacity: 0;
        animation: riseIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.25s forwards;
      }
      .sw {
        width: 2.5px;
        border-radius: 10px;
        background: linear-gradient(to top, var(--accent) 0%, #e8a898 100%);
        opacity: 0.5;
        animation: swPulse ease-in-out infinite alternate;
        transform-origin: bottom;
      }
      /* Symmetric mountain shape */
      .sw:nth-child(1) {
        height: 6px;
        animation-duration: 1s;
        animation-delay: 0s;
      }
      .sw:nth-child(2) {
        height: 12px;
        animation-duration: 0.9s;
        animation-delay: 0.07s;
      }
      .sw:nth-child(3) {
        height: 20px;
        animation-duration: 1.1s;
        animation-delay: 0.14s;
      }
      .sw:nth-child(4) {
        height: 28px;
        animation-duration: 0.8s;
        animation-delay: 0.21s;
      }
      .sw:nth-child(5) {
        height: 36px;
        animation-duration: 1s;
        animation-delay: 0.28s;
      }
      .sw:nth-child(6) {
        height: 28px;
        animation-duration: 0.9s;
        animation-delay: 0.21s;
      }
      .sw:nth-child(7) {
        height: 20px;
        animation-duration: 1.1s;
        animation-delay: 0.14s;
      }
      .sw:nth-child(8) {
        height: 12px;
        animation-duration: 0.8s;
        animation-delay: 0.07s;
      }
      .sw:nth-child(9) {
        height: 6px;
        animation-duration: 1s;
        animation-delay: 0s;
      }
      .sw:nth-child(10) {
        height: 12px;
        animation-duration: 0.9s;
        animation-delay: 0.07s;
      }
      .sw:nth-child(11) {
        height: 20px;
        animation-duration: 1.1s;
        animation-delay: 0.14s;
      }
      .sw:nth-child(12) {
        height: 28px;
        animation-duration: 0.8s;
        animation-delay: 0.21s;
      }
      .sw:nth-child(13) {
        height: 36px;
        animation-duration: 1s;
        animation-delay: 0.28s;
      }
      .sw:nth-child(14) {
        height: 28px;
        animation-duration: 0.9s;
        animation-delay: 0.21s;
      }
      .sw:nth-child(15) {
        height: 20px;
        animation-duration: 1.1s;
        animation-delay: 0.14s;
      }
      .sw:nth-child(16) {
        height: 12px;
        animation-duration: 0.8s;
        animation-delay: 0.07s;
      }
      .sw:nth-child(17) {
        height: 6px;
        animation-duration: 1s;
        animation-delay: 0s;
      }
      @keyframes swPulse {
        from {
          transform: scaleY(0.3);
          opacity: 0.25;
        }
        to {
          transform: scaleY(1);
          opacity: 0.7;
        }
      }

      /* ═══════════════════════════════════
       LOCATION BADGE
    ═══════════════════════════════════ */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 0.5rem 1.3rem;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(184, 106, 69, 0.18);
        box-shadow: 0 4px 24px rgba(184, 106, 69, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        font-size: 0.73rem;
        font-weight: 200;
        letter-spacing: 0.1em;
        color: var(--muted);
        opacity: 0;
        animation: riseIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.45s forwards;
      }
      .badge-pulse {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 0 rgba(184, 106, 69, 0.4);
        animation: pulseBadge 2.5s ease-in-out infinite;
      }
      @keyframes pulseBadge {
        0% {
          box-shadow: 0 0 0 0 rgba(184, 106, 69, 0.5);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(184, 106, 69, 0);
          transform: scale(1.1);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(184, 106, 69, 0);
          transform: scale(1);
        }
      }

      /* ═══════════════════════════════════
       AUTOPLAY OVERLAY
       (shown until user interacts — browsers
        block autoplay without interaction)
    ═══════════════════════════════════ */
      .tap-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 3.5rem;
        pointer-events: none;
        opacity: 0;
        animation: riseIn 1s ease 2.5s forwards;
      }
      .tap-hint {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0.55rem 1.4rem;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(184, 106, 69, 0.2);
        font-size: 0.68rem;
        font-weight: 200;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        animation: floatHint 2.5s ease-in-out infinite;
        pointer-events: none;
      }
      .tap-hint-icon {
        font-size: 1rem;
        animation: tapBounce 1.5s ease-in-out infinite;
      }
      @keyframes floatHint {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @keyframes tapBounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      /* ═══════════════════════════════════
       MUSIC PLAYER BUTTON
    ═══════════════════════════════════ */
      .player {
        position: fixed;
        bottom: 1.8rem;
        right: 1.8rem;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        animation: riseIn 1s ease 2s forwards;
      }
      .pl-label {
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 200;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(12px);
        padding: 0.35rem 0.9rem;
        border-radius: 100px;
        border: 1px solid rgba(184, 106, 69, 0.12);
        transition: opacity 0.8s, color 0.3s;
      }
      .pl-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 1.5px solid rgba(184, 106, 69, 0.28);
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(18px);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 28px rgba(184, 106, 69, 0.2),
          inset 0 1.5px 0 rgba(255, 255, 255, 0.95);
        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
      }
      .pl-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 30%,
          rgba(255, 255, 255, 0.6),
          transparent 65%
        );
      }
      .pl-btn:hover {
        transform: scale(1.14);
        box-shadow: 0 8px 40px rgba(184, 106, 69, 0.4),
          inset 0 1.5px 0 rgba(255, 255, 255, 0.95);
      }
      /* Spinning ring when playing */
      .pl-btn.playing::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          transparent 60%,
          var(--accent),
          var(--rose),
          transparent
        );
        animation: spinBtn 2s linear infinite;
      }
      @keyframes spinBtn {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .pl-btn svg {
        width: 22px;
        height: 22px;
        position: relative;
        z-index: 1;
      }

      /* EQ bars in button */
      .eq-btn {
        display: none;
        gap: 2px;
        align-items: flex-end;
        height: 16px;
        position: relative;
        z-index: 1;
      }
      .eq-btn.show {
        display: flex;
      }
      .eq-btn b {
        display: block;
        width: 3px;
        border-radius: 3px;
        background: linear-gradient(to top, var(--accent), var(--rose));
        animation: eqBtn 0.6s ease-in-out infinite alternate;
      }
      .eq-btn b:nth-child(1) {
        height: 5px;
        animation-delay: 0s;
      }
      .eq-btn b:nth-child(2) {
        height: 13px;
        animation-delay: 0.12s;
      }
      .eq-btn b:nth-child(3) {
        height: 7px;
        animation-delay: 0.24s;
      }
      .eq-btn b:nth-child(4) {
        height: 15px;
        animation-delay: 0.08s;
      }
      @keyframes eqBtn {
        from {
          transform: scaleY(0.25);
          opacity: 0.4;
        }
        to {
          transform: scaleY(1.1);
          opacity: 1;
        }
      }

      /* ═══════════════════════════════════
       HELPERS
    ═══════════════════════════════════ */
      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

    <!-- Autoplay hint — appears after page loads, disappears after first interaction -->

        Tap anywhere for music

    <!-- Music toggle button -->
    <div class="player">
      <div class="pl-label" id="plLabel">Music</div>
      <button class="pl-btn" id="musicBtn" aria-label="Toggle music">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9.5" stroke="#b86a45" stroke-width="0.9" />
          <path d="M10.5 8.8l5.5 3.2-5.5 3.2V8.8z" fill="#b86a45" />
        </svg>
        <div class="eq-btn" id="eqBtn"><b></b><b></b><b></b><b></b></div>
      </button>
    </div>

    <!--
    ══════════════════════════════════════════════════
    🎵 HOW TO ADD YOUR MUSIC FILE:
    1. In your GitHub repo → create folder: assets/music/
    2. Upload your .mp3 file, name it:      background.mp3
    3. Done! The path below is already set ✅

    If your file has a different name, change:
      background.mp3  →  yourfilename.mp3
    ══════════════════════════════════════════════════
  -->
    <audio id="bgMusic" loop preload="auto">
      <source src="./assets/music/background.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const audio = document.getElementById("bgMusic");
      const btn = document.getElementById("musicBtn");
      const eq = document.getElementById("eqBtn");
      const icon = document.getElementById("iconPlay");
      const label = document.getElementById("plLabel");
      const overlay = document.getElementById("tapOverlay");
      let playing = false;
      let interacted = false;

      function startMusic() {
        audio.volume = 0;
        audio
          .play()
          .then(() => {
            playing = true;
            icon.style.display = "none";
            eq.classList.add("show");
            btn.classList.add("playing");
            label.textContent = "♪ Playing";
            label.style.color = "#b86a45";
            // Fade in volume
            let v = 0;
            const fade = setInterval(() => {
              v = Math.min(v + 0.04, 0.85);
              audio.volume = v;
              if (v >= 0.85) clearInterval(fade);
            }, 80);
          })
          .catch(() => {});
      }

      function stopMusic() {
        let v = audio.volume;
        const fade = setInterval(() => {
          v = Math.max(v - 0.06, 0);
          audio.volume = v;
          if (v <= 0) {
            clearInterval(fade);
            audio.pause();
            playing = false;
            icon.style.display = "";
            eq.classList.remove("show");
            btn.classList.remove("playing");
            label.textContent = "Music";
            label.style.color = "";
          }
        }, 60);
      }

      // ── First interaction anywhere → autoplay ──────────
      function onFirstInteraction(e) {
        if (interacted) return;
        // Don't trigger on the music button itself (let button handle it)
        if (btn.contains(e.target)) return;
        interacted = true;
        overlay.style.transition = "opacity 0.8s";
        overlay.style.opacity = "0";
        setTimeout(() => overlay.remove(), 900);
        startMusic();
        document.removeEventListener("click", onFirstInteraction);
        document.removeEventListener("touchstart", onFirstInteraction);
      }

      document.addEventListener("click", onFirstInteraction);
      document.addEventListener("touchstart", onFirstInteraction);

      // ── Music button toggle ─────────────────────────────
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (!interacted) {
          interacted = true;
          overlay.style.transition = "opacity 0.8s";
          overlay.style.opacity = "0";
          setTimeout(() => overlay.remove(), 900);
          document.removeEventListener("click", onFirstInteraction);
          document.removeEventListener("touchstart", onFirstInteraction);
        }
        playing ? stopMusic() : startMusic();
      });

      // Auto-hide label after 5s
      setTimeout(() => {
        label.style.opacity = "0";
        label.style.transition = "opacity 1s";
      }, 5000);
      btn.addEventListener("mouseenter", () => {
        label.style.opacity = "1";
      });
      btn.addEventListener("mouseleave", () => {
        if (!playing) label.style.opacity = "0";
      });

      // ── PETALS ─────────────────────────────────────────
      const petalWrap = document.getElementById("petals");
      const petalColors = [
        "rgba(223,168,152,0.6)",
        "rgba(237,212,196,0.6)",
        "rgba(201,149,90,0.4)",
        "rgba(168,196,160,0.5)",
        "rgba(164,200,220,0.45)",
        "rgba(200,188,224,0.5)",
        "rgba(255,220,195,0.5)",
      ];
      const petalShapes = [
        "50% 50% 30% 70%/60% 40% 60% 40%",
        "60% 40% 70% 30%/40% 50% 50% 60%",
        "50%",
        "40% 60% 50% 50%/50% 40% 60% 50%",
      ];
      for (let i = 0; i < 28; i++) {
        const p = document.createElement("div");
        p.className = "petal";
        const s = Math.random() * 15 + 5;
        p.style.cssText = `
        width:${s}px; height:${s * 0.7}px;
        left:${Math.random() * 100}%; top:-20px;
        background:${
          petalColors[Math.floor(Math.random() * petalColors.length)]
        };
        border-radius:${
          petalShapes[Math.floor(Math.random() * petalShapes.length)]
        };
        animation-duration:${Math.random() * 14 + 9}s;
        animation-delay:${Math.random() * 16}s;
      `;
        petalWrap.appendChild(p);
      }

      // ── STARS ──────────────────────────────────────────
      const starWrap = document.getElementById("stars");
      for (let i = 0; i < 18; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const size = Math.random() * 3 + 1.5;
        s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%; top:${Math.random() * 100}%;
        animation-duration:${Math.random() * 3 + 1.5}s;
        animation-delay:${Math.random() * 4}s;
      `;
        starWrap.appendChild(s);
      }
    </script>
