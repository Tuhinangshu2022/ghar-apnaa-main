<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GharApnaa — Coming Soon</title>
    <meta
      name="description"
      content="Har sapne ko mile apnaa address. India ke har ghar ke liye."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Kalam:wght@300&family=DM+Sans:wght@200;300&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #fdf7f0;
        --ink: #261a15;
        --muted: #9a7d6e;
        --accent: #b86a45;
        --gold: #c9955a;
        --rose: #dfa898;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        /* Force GPU compositing on body */
        transform: translateZ(0);
      }

      /* ═══════════════════════════════════════════
       BACKGROUND — pure CSS, zero JS, zero blur
       Mobile: static gradient only
       Desktop: soft animated gradient
    ═══════════════════════════════════════════ */
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
            ellipse 70% 55% at 12% 18%,
            rgba(245, 200, 184, 0.35) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 65% 50% at 88% 14%,
            rgba(240, 232, 216, 0.35) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 65% at 82% 88%,
            rgba(200, 220, 232, 0.3) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 70% 55% at 10% 82%,
            rgba(212, 232, 200, 0.3) 0%,
            transparent 55%
          ),
          var(--bg);
      }

      /* ═══════════════════════════════════════════
       CORNER FRAMES — CSS only, no JS
    ═══════════════════════════════════════════ */
      .frame {
        position: fixed;
        z-index: 3;
        pointer-events: none;
        opacity: 0;
        animation: fadeIn 2s ease 1.5s forwards;
      }
      .frame.tl {
        top: 0;
        left: 0;
      }
      .frame.tr {
        top: 0;
        right: 0;
        transform: scaleX(-1);
      }
      .frame.bl {
        bottom: 0;
        left: 0;
        transform: scaleY(-1);
      }
      .frame.br {
        bottom: 0;
        right: 0;
        transform: scale(-1);
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* ═══════════════════════════════════════════
       STAGE
    ═══════════════════════════════════════════ */
      .stage {
        position: relative;
        z-index: 10;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(1rem, 4vw, 2rem);
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        max-width: 520px;
      }

      /* ═══════════════════════════════════════════
       TOP LABEL
    ═══════════════════════════════════════════ */
      .label-row {
        display: flex;
        align-items: center;
        gap: clamp(8px, 2vw, 16px);
        margin-bottom: clamp(0.9rem, 2.5vw, 1.8rem);
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
      }
      .lline {
        height: 1px;
        width: clamp(28px, 5vw, 52px);
        background: linear-gradient(90deg, transparent, var(--accent));
      }
      .lline.r {
        background: linear-gradient(90deg, var(--accent), transparent);
      }
      .ltext {
        font-size: clamp(0.48rem, 1.2vw, 0.58rem);
        font-weight: 200;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--accent);
      }
      .lgem {
        width: 4px;
        height: 4px;
        background: var(--accent);
        transform: rotate(45deg);
        opacity: 0.6;
        flex-shrink: 0;
      }

      /* ═══════════════════════════════════════════
       LOGO — minimal animations on mobile
    ═══════════════════════════════════════════ */
      .logo-wrap {
        margin-top: 20px;
        position: relative;
        width: clamp(108px, 22vmin, 172px);
        height: clamp(108px, 22vmin, 172px);
        margin-bottom: clamp(1.1rem, 3vw, 1.9rem);
        opacity: 0;
        animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
      }

      /* Ring — GPU only (transform), no filter/blur */
      .logo-ring {
        position: absolute;
        inset: -7px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #e8a898,
          #c9955a,
          #a8c4a0,
          #a4c8dc,
          #c8bce0,
          #e8a898
        );
        opacity: 0.45;
        will-change: transform;
        animation: spinRing 12s linear infinite;
        /* slower on mobile = fewer composited frames */
      }
      .logo-gap {
        position: absolute;
        inset: -2px;
        border-radius: 50%;
        background: var(--bg);
      }
      .logo-inner {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 28px rgba(184, 106, 69, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        will-change: transform;
        animation: logoFloat 5s ease-in-out infinite;
      }
      .logo-inner img {
        width: 65%;
        filter: drop-shadow(0 3px 10px rgba(184, 106, 69, 0.2));
      }

      @keyframes spinRing {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes logoFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }
      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.25) rotate(-15deg);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      /* ═══════════════════════════════════════════
       BRAND
    ═══════════════════════════════════════════ */
      .brand {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(7rem, 13vw, 8rem);
        font-weight: 200;
        line-height: 0.86;
        letter-spacing: -0.01em;
        color: var(--ink);
        margin-bottom: clamp(0.3rem, 1vw, 0.55rem);
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
      }
      .brand .g {
        display: block;
      }
      .brand .a {
        display: block;
        font-style: italic;
        font-weight: 300;
        background: linear-gradient(135deg, var(--accent), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ═══════════════════════════════════════════
       SUBTITLE
    ═══════════════════════════════════════════ */
      .sub-wrap {
        display: flex;
        align-items: center;
        gap: clamp(8px, 2vw, 14px);
        margin-bottom: clamp(0.8rem, 2vw, 1.2rem);
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.78s forwards;
      }
      .sline {
        width: clamp(16px, 3vw, 28px);
        height: 1px;
        background: var(--muted);
        opacity: 0.3;
      }
      .stext {
        font-family: "Kalam", cursive;
        font-weight: 300;
        font-size: clamp(1.6rem, 2.5vw, 1.3rem);
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      /* ═══════════════════════════════════════════
       TAGLINE
    ═══════════════════════════════════════════ */
      .tagline {
        font-size: clamp(1.3rem, 1.6vw, 0.84rem);
        font-weight: 200;
        color: var(--muted);
        line-height: 2;
        letter-spacing: 0.04em;
        max-width: 50ch;
        margin-bottom: clamp(1.1rem, 2.5vw, 1.7rem);
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.96s forwards;
      }

      /* ═══════════════════════════════════════════
       SOUNDWAVE
       Mobile: 9 bars only (not 17)
       Desktop: 17 bars
       All use transform only — no layout changes
    ═══════════════════════════════════════════ */
      .soundwave {
        display: flex;
        align-items: center;
        gap: clamp(2px, 0.4vw, 3px);
        height: clamp(22px, 4vw, 36px);
        margin-bottom: clamp(1.1rem, 2.5vw, 1.7rem);
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
      }
      .sw {
        width: clamp(2px, 0.3vw, 2.5px);
        border-radius: 10px;
        background: linear-gradient(to top, var(--accent), var(--rose));
        opacity: 0.5;
        will-change: transform;
        animation: swPulse ease-in-out infinite alternate;
        transform-origin: bottom;
      }
      .sw:nth-child(1) {
        height: 18%;
        animation-duration: 0.95s;
        animation-delay: 0s;
      }
      .sw:nth-child(2) {
        height: 40%;
        animation-duration: 1.05s;
        animation-delay: 0.07s;
      }
      .sw:nth-child(3) {
        height: 68%;
        animation-duration: 0.85s;
        animation-delay: 0.14s;
      }
      .sw:nth-child(4) {
        height: 90%;
        animation-duration: 1.1s;
        animation-delay: 0.21s;
      }
      .sw:nth-child(5) {
        height: 100%;
        animation-duration: 0.92s;
        animation-delay: 0.28s;
      }
      .sw:nth-child(6) {
        height: 90%;
        animation-duration: 1.05s;
        animation-delay: 0.21s;
      }
      .sw:nth-child(7) {
        height: 68%;
        animation-duration: 0.85s;
        animation-delay: 0.14s;
      }
      .sw:nth-child(8) {
        height: 40%;
        animation-duration: 1.1s;
        animation-delay: 0.07s;
      }
      .sw:nth-child(9) {
        height: 18%;
        animation-duration: 0.92s;
        animation-delay: 0s;
      }
      /* Desktop extra bars */
      .sw.d {
        display: none;
      }
      .sw.d:nth-child(10) {
        height: 40%;
        animation-duration: 1.05s;
        animation-delay: 0.07s;
      }
      .sw.d:nth-child(11) {
        height: 68%;
        animation-duration: 0.85s;
        animation-delay: 0.14s;
      }
      .sw.d:nth-child(12) {
        height: 90%;
        animation-duration: 1.1s;
        animation-delay: 0.21s;
      }
      .sw.d:nth-child(13) {
        height: 100%;
        animation-duration: 0.92s;
        animation-delay: 0.28s;
      }
      .sw.d:nth-child(14) {
        height: 90%;
        animation-duration: 1.05s;
        animation-delay: 0.21s;
      }
      .sw.d:nth-child(15) {
        height: 68%;
        animation-duration: 0.85s;
        animation-delay: 0.14s;
      }
      .sw.d:nth-child(16) {
        height: 40%;
        animation-duration: 1.1s;
        animation-delay: 0.07s;
      }
      .sw.d:nth-child(17) {
        height: 18%;
        animation-duration: 0.92s;
        animation-delay: 0s;
      }
      @keyframes swPulse {
        from {
          transform: scaleY(0.3);
          opacity: 0.25;
        }
        to {
          transform: scaleY(1);
          opacity: 0.68;
        }
      }

      /* ═══════════════════════════════════════════
       BADGE
       NO backdrop-filter on mobile (very expensive)
    ═══════════════════════════════════════════ */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: clamp(0.32rem, 1vw, 0.48rem) clamp(0.85rem, 2vw, 1.25rem);
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(184, 106, 69, 0.18);
        box-shadow: 0 2px 16px rgba(184, 106, 69, 0.1);
        font-size: clamp(0.99rem, 1.4vw, 0.73rem);
        font-weight: 200;
        letter-spacing: 0.09em;
        color: var(--muted);
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
      }
      .badge-pulse {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        will-change: transform;
        animation: pulseBadge 2.8s ease-in-out infinite;
      }
      @keyframes pulseBadge {
        0% {
          box-shadow: 0 0 0 0 rgba(184, 106, 69, 0.45);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(184, 106, 69, 0);
          transform: scale(1.1);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(184, 106, 69, 0);
          transform: scale(1);
        }
      }

      /* ═══════════════════════════════════════════
       TAP HINT
       No backdrop-filter
    ═══════════════════════════════════════════ */
      .tap-overlay {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 200;
        display: flex;
        justify-content: center;
        padding-bottom: clamp(1.4rem, 4vw, 3rem);
        pointer-events: none;
        opacity: 0;
        animation: riseIn 0.9s ease 2.5s forwards;
        transition: opacity 0.7s;
      }
      .tap-hint {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 0.48rem 1.25rem;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(184, 106, 69, 0.2);
        font-size: clamp(0.6rem, 1.3vw, 0.68rem);
        font-weight: 200;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        will-change: transform;
        animation: floatHint 2.8s ease-in-out infinite;
      }
      .tap-icon {
        will-change: transform;
        animation: tapBounce 1.8s ease-in-out infinite;
      }
      @keyframes floatHint {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }
      @keyframes tapBounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      /* ═══════════════════════════════════════════
       MUSIC BUTTON
       NO backdrop-filter on mobile
    ═══════════════════════════════════════════ */
      .player {
        position: fixed;
        bottom: clamp(1rem, 3vw, 1.8rem);
        right: clamp(1rem, 3vw, 1.8rem);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        animation: riseIn 0.9s ease 2s forwards;
      }
      .pl-label {
        font-size: clamp(0.56rem, 1.2vw, 0.65rem);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 200;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.8);
        padding: 0.33rem 0.85rem;
        border-radius: 100px;
        border: 1px solid rgba(184, 106, 69, 0.13);
        transition: opacity 0.8s, color 0.3s;
      }
      .pl-btn {
        width: clamp(44px, 6vw, 54px);
        height: clamp(44px, 6vw, 54px);
        border-radius: 50%;
        border: 1.5px solid rgba(184, 106, 69, 0.28);
        background: rgba(255, 255, 255, 0.85);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 20px rgba(184, 106, 69, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        will-change: transform;
        transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
      }
      .pl-btn:hover {
        transform: scale(1.1);
      }
      .pl-btn:active {
        transform: scale(0.94);
      }
      /* Spinning ring when playing */
      .pl-btn.playing::after {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          transparent 55%,
          var(--accent),
          var(--rose),
          transparent
        );
        will-change: transform;
        animation: spinBtn 2.2s linear infinite;
      }
      @keyframes spinBtn {
        to {
          transform: rotate(360deg);
        }
      }
      .pl-btn svg {
        width: clamp(17px, 2.5vw, 21px);
        height: clamp(17px, 2.5vw, 21px);
        position: relative;
        z-index: 1;
      }

      .eq-btn {
        display: none;
        gap: 2px;
        align-items: flex-end;
        height: 15px;
        position: relative;
        z-index: 1;
      }
      .eq-btn.show {
        display: flex;
      }
      .eq-btn b {
        display: block;
        width: 3px;
        border-radius: 3px;
        background: linear-gradient(to top, var(--accent), var(--rose));
        will-change: transform;
        animation: eqAnim 0.65s ease-in-out infinite alternate;
      }
      .eq-btn b:nth-child(1) {
        height: 5px;
        animation-delay: 0s;
      }
      .eq-btn b:nth-child(2) {
        height: 13px;
        animation-delay: 0.12s;
      }
      .eq-btn b:nth-child(3) {
        height: 7px;
        animation-delay: 0.24s;
      }
      .eq-btn b:nth-child(4) {
        height: 15px;
        animation-delay: 0.08s;
      }
      @keyframes eqAnim {
        from {
          transform: scaleY(0.25);
          opacity: 0.4;
        }
        to {
          transform: scaleY(1.1);
          opacity: 1;
        }
      }

      /* ═══════════════════════════════════════════
       PETALS — lightweight version
    ═══════════════════════════════════════════ */
      .petals {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      .petal {
        position: absolute;
        top: -16px;
        opacity: 0;
        will-change: transform, opacity;
        animation: petalFall linear infinite;
      }
      @keyframes petalFall {
        0% {
          opacity: 0;
          transform: translateY(0) rotate(0deg) scale(0.55);
        }
        8% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
          transform: translateY(108vh) rotate(360deg) scale(0.9);
        }
      }

      /* ═══════════════════════════════════════════
       DESKTOP UPGRADES (≥ 768px)
       Only on desktop do we add expensive effects
    ═══════════════════════════════════════════ */
      @media (min-width: 768px) {
        /* Backdrop filter on badge */
        .badge {
          background: rgba(255, 255, 255, 0.58);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
        }
        /* Backdrop on tap hint */
        .tap-hint {
          background: rgba(255, 255, 255, 0.65);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
        }
        /* Backdrop on music label */
        .pl-label {
          background: rgba(255, 255, 255, 0.65);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
        }
        /* Backdrop on music button */
        .pl-btn {
          background: rgba(255, 255, 255, 0.72);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
        }
        /* Show extra wave bars */
        .sw.d {
          display: block;
        }
        /* Faster ring spin */
        .logo-ring {
          animation-duration: 9s;
        }
      }

      /* ═══════════════════════════════════════════
       REDUCE MOTION
    ═══════════════════════════════════════════ */
      @media (prefers-reduced-motion: reduce) {
        .logo-ring,
        .logo-inner,
        .soundwave .sw,
        .petal,
        .badge-pulse,
        .tap-hint,
        .tap-icon,
        .pl-btn.playing::after,
        .eq-btn b {
          animation: none !important;
        }
        .logo-wrap,
        .label-row,
        .brand,
        .sub-wrap,
        .tagline,
        .soundwave,
        .badge,
        .player,
        .tap-overlay {
          opacity: 1 !important;
          transform: none !important;
          animation: none !important;
        }
      }

      @media (max-width: 768px) {
        /* Reduce the number of petals */
        .petal {
          animation-duration: 20s !important; /* Slower animation */
          animation-iteration-count: 1; /* Only one iteration */
        }

        /* Simplify soundwave animation */
        .soundwave .sw {
          animation: none !important; /* Disable animation */
          opacity: 0.5; /* Static bars */
        }

        /* Simplify logo animation */
        .logo-ring {
          animation: none !important; /* Disable spinning */
        }
        .logo-inner {
          animation: none !important; /* Disable floating */
        }

        /* Simplify background gradient */
        .bg {
          background: var(--bg); /* Static background */
        }

        /* Disable corner frame animations */
        .frame {
          animation: none !important;
          opacity: 1; /* Always visible */
        }

        /* Disable tap hint animation */
        .tap-hint {
          animation: none !important;
          opacity: 1; /* Always visible */
        }

        /* Disable music button animations */
        .pl-btn {
          animation: none !important;
        }
        .pl-btn.playing::after {
          animation: none !important;
        }
      }

      /* ═══════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════ */
      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>

    <!-- Corner frames -->
    <svg
      class="frame tl"
      width="140"
      height="140"
      viewBox="0 0 140 140"
      fill="none"

    <!--
    ══════════════════════════════════════════════
    🎵 MUSIC SETUP (2 easy steps):
    1. Create folder in repo:  assets/music/
    2. Upload your .mp3 as:    background.mp3
    ══════════════════════════════════════════════
  -->
    <audio id="bgMusic" loop preload="none">
      <!-- preload="none" = don't load until needed = faster page load on mobile -->
      <source src="./assets/music/background.mp3" type="audio/mpeg" />
    </audio>

    <script>
      // ── DEVICE CHECK ─────────────────────────────────────
      const isMobile =
        window.innerWidth < 768 ||
        /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

      // ── MUSIC ─────────────────────────────────────────────
      const audio = document.getElementById("bgMusic");
      const btn = document.getElementById("musicBtn");
      const eq = document.getElementById("eqBtn");
      const icon = document.getElementById("iconPlay");
      const label = document.getElementById("plLabel");
      const overlay = document.getElementById("tapOverlay");
      let playing = false;
      let interacted = false;

      function startPlay() {
        audio.volume = 0;
        audio
          .play()
          .then(() => {
            playing = true;
            icon.style.display = "none";
            eq.classList.add("show");
            btn.classList.add("playing");
            label.textContent = "♪ Playing";
            label.style.color = "#b86a45";
            // Smooth fade in
            let v = 0;
            const t = setInterval(() => {
              v = Math.min(v + 0.05, 0.8);
              audio.volume = v;
              if (v >= 0.8) clearInterval(t);
            }, 80);
          })
          .catch(() => {});
      }

      function stopPlay() {
        let v = audio.volume;
        const t = setInterval(() => {
          v = Math.max(v - 0.06, 0);
          audio.volume = v;
          if (v <= 0) {
            clearInterval(t);
            audio.pause();
            playing = false;
            icon.style.display = "";
            eq.classList.remove("show");
            btn.classList.remove("playing");
            label.textContent = "Music";
            label.style.color = "";
          }
        }, 55);
      }

      function hideOverlay() {
        overlay.style.opacity = "0";
        setTimeout(() => overlay.remove(), 800);
      }

      function onFirstInteraction(e) {
        if (interacted || btn.contains(e.target)) return;
        interacted = true;
        hideOverlay();
        startPlay();
        document.removeEventListener("click", onFirstInteraction);
        document.removeEventListener("touchstart", onFirstInteraction);
      }
      document.addEventListener("click", onFirstInteraction);
      document.addEventListener("touchstart", onFirstInteraction, {
        passive: true,
      });

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (!interacted) {
          interacted = true;
          hideOverlay();
          document.removeEventListener("click", onFirstInteraction);
          document.removeEventListener("touchstart", onFirstInteraction);
        }
        playing ? stopPlay() : startPlay();
      });

      // Hide label after 5s
      setTimeout(() => {
        label.style.opacity = "0";
        label.style.transition = "opacity 1s";
      }, 5000);
      btn.addEventListener("mouseenter", () => {
        label.style.opacity = "1";
      });
      btn.addEventListener("mouseleave", () => {
        if (!playing) label.style.opacity = "0";
      });

      // ── PETALS ─────────────────────────────────────────────
      // Mobile: 4 petals, slow | Tablet: 10 | Desktop: 22
      const count = isMobile ? 4 : window.innerWidth < 1025 ? 10 : 22;
      const wrap = document.getElementById("petals");
      const colors = [
        "rgba(223,168,152,0.5)",
        "rgba(237,212,196,0.5)",
        "rgba(201,149,90,0.35)",
        "rgba(168,196,160,0.45)",
        "rgba(164,200,220,0.4)",
        "rgba(200,188,224,0.45)",
      ];
      const shapes = [
        "50% 50% 30% 70%/60% 40% 60% 40%",
        "60% 40% 70% 30%/40% 50% 50% 60%",
        "50%",
      ];

      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "petal";
        const s = Math.random() * 8 + 4; // Smaller petals
        const dur = isMobile ? Math.random() * 6 + 10 : Math.random() * 12 + 10;
        p.style.cssText = `
        width:${s}px;
        height:${s * 0.68}px;
        left:${Math.random() * 100}%;
        background:${colors[i % colors.length]};
        border-radius:${shapes[i % shapes.length]};
        animation-duration:${dur}s;
        animation-delay:${Math.random() * 10}s;
      `;
        wrap.appendChild(p);
      }
    </script>
